<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- iPad/iPhoneでの全画面（PWA）対応 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="九九れんしゅう">
    <link rel="apple-touch-icon" href="https://placehold.co/180x180/3b82f6/ffffff?text=9x9">
    
    <title>九九れんしゅうアプリ</title>
    
    <!-- Tailwind CSS (スタイリング用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (ブラウザ上でJSXを変換するため) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        // Babelが自動で react/jsx-runtime をインポートしようとするのを防ぎ、従来のReact.createElementを使用するよう設定
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { runtime: 'classic' }]
            ]
        });
    </script>

    <style>
        /* タッチデバイスでの不要なハイライトやスクロールを防止 */
        body {
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
    </style>
</head>
<body class="bg-blue-50">
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useRef } = React;

        // --- アイコンコンポーネント (LucideアイコンのSVGを直接埋め込み) ---
        const Volume2Icon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
        );
        const PlayIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        );
        const RotateCcwIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
        );
        const XIcon = ({ size = 24, className = "", strokeWidth = 2 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );
        const ArrowLeftIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        );
        const MaximizeIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        );

        // --- メインアプリコンポーネント ---
        function App() {
            const [appState, setAppState] = useState('menu');
            const [selectedDan, setSelectedDan] = useState(1);
            const [playMode, setPlayMode] = useState('sequential');
            
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [inputValue, setInputValue] = useState('');
            const [feedback, setFeedback] = useState(null);

            const [availableVoices, setAvailableVoices] = useState([]);
            const audioCtxRef = useRef(null);

            // 音声リストの取得
            useEffect(() => {
                const loadVoices = () => {
                    if ('speechSynthesis' in window) {
                        setAvailableVoices(window.speechSynthesis.getVoices());
                    }
                };
                loadVoices();
                if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            // 効果音の生成 (Web Audio API)
            const playSound = (type) => {
                try {
                    if (!audioCtxRef.current) {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        if (!AudioContext) return;
                        audioCtxRef.current = new AudioContext();
                    }
                    const ctx = audioCtxRef.current;
                    if (ctx.state === 'suspended') ctx.resume();

                    if (type === 'correct') {
                        const osc1 = ctx.createOscillator();
                        const gain1 = ctx.createGain();
                        osc1.type = 'sine';
                        osc1.frequency.setValueAtTime(783.99, ctx.currentTime);
                        gain1.gain.setValueAtTime(0, ctx.currentTime);
                        gain1.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.05);
                        gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                        osc1.connect(gain1);
                        gain1.connect(ctx.destination);
                        osc1.start(ctx.currentTime);
                        osc1.stop(ctx.currentTime + 0.4);

                        const osc2 = ctx.createOscillator();
                        const gain2 = ctx.createGain();
                        osc2.type = 'sine';
                        osc2.frequency.setValueAtTime(659.25, ctx.currentTime + 0.35);
                        gain2.gain.setValueAtTime(0, ctx.currentTime + 0.35);
                        gain2.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.4);
                        gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
                        osc2.connect(gain2);
                        gain2.connect(ctx.destination);
                        osc2.start(ctx.currentTime + 0.35);
                        osc2.stop(ctx.currentTime + 0.8);
                    } else if (type === 'incorrect') {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(180, ctx.currentTime);
                        gain.gain.setValueAtTime(0, ctx.currentTime);
                        gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.05);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.5);
                    }
                } catch (e) {
                    console.error("Audio playback error:", e);
                }
            };

            // 音声読み上げ
            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'ja-JP';
                    utterance.rate = 0.82;
                    utterance.pitch = 1.0;
                    utterance.volume = 0.9;

                    let voiceToUse = availableVoices.find(v => v.name === 'Google 日本語' || v.name === 'Google Japanese');
                    if (!voiceToUse) voiceToUse = availableVoices.find(v => v.name.includes('Kyoko') || v.name.includes('Haruka') || v.name.includes('Ayumi') || v.name.includes('Nanami'));
                    if (!voiceToUse) voiceToUse = availableVoices.find(v => v.lang.includes('ja'));
                    
                    if (voiceToUse) utterance.voice = voiceToUse;

                    window.speechSynthesis.speak(utterance);
                }
            };

            const startGame = () => {
                if ('speechSynthesis' in window) {
                    const dummy = new SpeechSynthesisUtterance('');
                    window.speechSynthesis.speak(dummy);
                    window.speechSynthesis.cancel();
                }

                let newQuestions = [];
                for (let i = 1; i <= 9; i++) {
                    newQuestions.push({
                        dan: selectedDan,
                        multiplier: i,
                        answer: selectedDan * i
                    });
                }

                if (playMode === 'random') {
                    for (let i = newQuestions.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [newQuestions[i], newQuestions[j]] = [newQuestions[j], newQuestions[i]];
                    }
                }

                setQuestions(newQuestions);
                setCurrentIndex(0);
                setInputValue('');
                setFeedback(null);
                setAppState('playing');
            };

            const toggleFullScreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log(`全画面表示にできませんでした: ${err.message}`);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            };

            useEffect(() => {
                if (appState === 'playing' && questions.length > 0 && !feedback) {
                    const currentQ = questions[currentIndex];
                    speak(`${currentQ.dan} かける ${currentQ.multiplier} は`);
                }
            }, [appState, currentIndex, questions, feedback]);

            const handleInput = (num) => {
                if (inputValue.length < 2) {
                    setInputValue(prev => prev + num);
                }
            };

            const clearInput = () => setInputValue('');

            const checkAnswer = () => {
                if (inputValue === '') return;

                const currentQ = questions[currentIndex];
                const numInput = parseInt(inputValue, 10);

                if (numInput === currentQ.answer) {
                    setFeedback('correct');
                    playSound('correct');
                    
                    setTimeout(() => {
                        speak(`${currentQ.dan} かける ${currentQ.multiplier} は、${currentQ.answer}。せいかい！`);
                    }, 700);
                    
                    setTimeout(() => {
                        if (currentIndex < questions.length - 1) {
                            setCurrentIndex(prev => prev + 1);
                            setInputValue('');
                            setFeedback(null);
                        } else {
                            speak('ぜんぶおわりました！よくがんばりました！');
                            setAppState('finished');
                        }
                    }, 3500);
                } else {
                    setFeedback('incorrect');
                    playSound('incorrect');
                    
                    setTimeout(() => {
                        speak('ちがうよ、もういちど かんがえてみよう。');
                    }, 500);
                    
                    setTimeout(() => {
                        setInputValue('');
                        setFeedback(null);
                    }, 2500);
                }
            };

            const readCurrentQuestion = () => {
                const currentQ = questions[currentIndex];
                speak(`${currentQ.dan} かける ${currentQ.multiplier} は`);
            };

            // メニュー画面
            if (appState === 'menu') {
                return (
                    <div className="min-h-[100dvh] bg-blue-50 flex flex-col items-center py-8 px-4 font-sans relative">
                        <button 
                            onClick={toggleFullScreen}
                            className="absolute top-4 right-4 bg-white text-gray-600 p-3 rounded-full shadow-md hover:bg-gray-100 transition-colors flex items-center gap-2 border-2 border-gray-200 active:translate-y-1"
                            aria-label="ぜんがめんにする"
                        >
                            <MaximizeIcon size={24} />
                            <span className="font-bold hidden sm:inline text-sm">がめんを おおきく</span>
                        </button>

                        <h1 className="text-4xl md:text-5xl font-bold text-blue-600 mb-8 mt-6 text-center bg-white py-4 px-8 rounded-3xl shadow-md border-4 border-blue-200">
                            くく れんしゅう
                        </h1>

                        <div className="bg-white p-6 rounded-3xl shadow-lg w-full max-w-2xl border-4 border-yellow-200 mb-8">
                            <h2 className="text-2xl font-bold text-gray-700 mb-4 text-center">
                                どの だん を やる？
                            </h2>
                            <div className="grid grid-cols-3 gap-3 md:gap-4 mb-6">
                                {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (
                                    <button
                                        key={num}
                                        onClick={() => setSelectedDan(num)}
                                        className={`text-2xl md:text-3xl font-bold py-4 rounded-2xl border-b-4 transition-all ${
                                            selectedDan === num
                                                ? 'bg-yellow-400 text-yellow-900 border-yellow-600 shadow-inner translate-y-1'
                                                : 'bg-yellow-100 text-yellow-700 border-yellow-300 shadow-md hover:bg-yellow-200'
                                        }`}
                                    >
                                        {num}のだん
                                    </button>
                                ))}
                            </div>

                            <h2 className="text-2xl font-bold text-gray-700 mb-4 text-center mt-8">
                                どっち の やりかた？
                            </h2>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                <button
                                    onClick={() => setPlayMode('sequential')}
                                    className={`flex-1 text-xl md:text-2xl font-bold py-4 px-6 rounded-2xl border-b-4 transition-all flex items-center justify-center gap-2 ${
                                        playMode === 'sequential'
                                            ? 'bg-green-400 text-green-900 border-green-600 shadow-inner translate-y-1'
                                            : 'bg-green-100 text-green-700 border-green-300 shadow-md hover:bg-green-200'
                                    }`}
                                >
                                    <RotateCcwIcon size={28} />
                                    じゅんばん
                                </button>
                                <button
                                    onClick={() => setPlayMode('random')}
                                    className={`flex-1 text-xl md:text-2xl font-bold py-4 px-6 rounded-2xl border-b-4 transition-all flex items-center justify-center gap-2 ${
                                        playMode === 'random'
                                            ? 'bg-purple-400 text-purple-900 border-purple-600 shadow-inner translate-y-1'
                                            : 'bg-purple-100 text-purple-700 border-purple-300 shadow-md hover:bg-purple-200'
                                    }`}
                                >
                                    <RotateCcwIcon size={28} className="transform rotate-180" />
                                    ばらばら
                                </button>
                            </div>
                        </div>

                        <button
                            onClick={startGame}
                            className="bg-red-500 hover:bg-red-600 text-white text-3xl md:text-4xl font-bold py-6 px-12 rounded-full border-b-8 border-red-700 shadow-xl transition-all active:border-b-0 active:translate-y-2 flex items-center gap-4"
                        >
                            <PlayIcon size={40} />
                            スタート！
                        </button>
                    </div>
                );
            }

            // 結果画面
            if (appState === 'finished') {
                return (
                    <div className="min-h-[100dvh] bg-pink-50 flex flex-col items-center justify-center py-8 px-4 font-sans text-center">
                        <div className="bg-white p-8 md:p-12 rounded-3xl shadow-xl border-8 border-pink-300 max-w-lg w-full">
                            <h1 className="text-5xl md:text-6xl font-bold text-pink-500 mb-6">おしまい！</h1>
                            <p className="text-3xl text-gray-700 font-bold mb-12">よく がんばったね！</p>
                            <button
                                onClick={() => setAppState('menu')}
                                className="w-full bg-blue-500 hover:bg-blue-600 text-white text-3xl font-bold py-6 px-8 rounded-full border-b-8 border-blue-700 shadow-lg transition-all active:border-b-0 active:translate-y-2 flex items-center justify-center gap-4"
                            >
                                <ArrowLeftIcon size={36} />
                                さいしょに もどる
                            </button>
                        </div>
                    </div>
                );
            }

            // プレイ画面
            const currentQ = questions[currentIndex];

            return (
                <div className="min-h-[100dvh] bg-green-50 flex flex-col items-center justify-between py-6 px-4 font-sans relative">
                    <div className="w-full max-w-2xl bg-gray-200 rounded-full h-6 mb-4 shadow-inner">
                        <div 
                            className="bg-green-500 h-6 rounded-full transition-all duration-500"
                            style={{ width: `${((currentIndex) / questions.length) * 100}%` }}
                        ></div>
                    </div>

                    <div className="bg-white w-full max-w-2xl rounded-3xl shadow-lg border-4 border-gray-200 p-6 flex flex-col items-center relative mb-4">
                        <button 
                            onClick={readCurrentQuestion}
                            className="absolute top-4 left-4 bg-blue-100 text-blue-600 p-3 rounded-full hover:bg-blue-200 transition-colors shadow"
                            aria-label="もういちどきく"
                        >
                            <Volume2Icon size={32} />
                        </button>

                        <div className="text-xl font-bold text-gray-500 mb-2">だい {currentIndex + 1} もん</div>

                        <div className="flex items-center justify-center gap-4 text-7xl md:text-8xl font-bold text-gray-800 my-4 tracking-widest">
                            <span>{currentQ.dan}</span>
                            <span className="text-gray-400">×</span>
                            <span>{currentQ.multiplier}</span>
                            <span className="text-gray-400">=</span>
                            <span className={`w-32 h-32 md:w-40 md:h-40 border-8 ${inputValue ? 'border-blue-400 text-blue-600' : 'border-dashed border-gray-300 text-gray-300'} rounded-2xl flex items-center justify-center bg-gray-50`}>
                                {inputValue || '?'}
                            </span>
                        </div>
                    </div>

                    <div className="w-full max-w-2xl flex-1 flex flex-col justify-end mb-4">
                        <div className="grid grid-cols-3 gap-3 md:gap-4 mb-4">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (
                                <button
                                    key={num}
                                    onClick={() => handleInput(num)}
                                    className="bg-white text-gray-800 text-4xl md:text-5xl font-bold py-6 rounded-2xl border-b-8 border-gray-300 shadow-md active:border-b-0 active:translate-y-2 hover:bg-gray-50 transition-all"
                                >
                                    {num}
                                </button>
                            ))}
                            <button
                                onClick={clearInput}
                                className="bg-red-100 text-red-600 text-3xl font-bold py-6 rounded-2xl border-b-8 border-red-300 shadow-md active:border-b-0 active:translate-y-2 hover:bg-red-200 transition-all"
                            >
                                けす
                            </button>
                            <button
                                onClick={() => handleInput(0)}
                                className="bg-white text-gray-800 text-4xl md:text-5xl font-bold py-6 rounded-2xl border-b-8 border-gray-300 shadow-md active:border-b-0 active:translate-y-2 hover:bg-gray-50 transition-all"
                            >
                                0
                            </button>
                            <button
                                onClick={checkAnswer}
                                disabled={!inputValue}
                                className={`text-3xl font-bold py-6 rounded-2xl border-b-8 shadow-md transition-all ${
                                    inputValue
                                        ? 'bg-blue-500 text-white border-blue-700 active:border-b-0 active:translate-y-2 hover:bg-blue-600'
                                        : 'bg-gray-200 text-gray-400 border-gray-300 cursor-not-allowed'
                                }`}
                            >
                                こたえる
                            </button>
                        </div>
                    </div>

                    <button 
                        onClick={() => setAppState('menu')}
                        className="text-gray-500 font-bold underline py-2"
                    >
                        はじめにもどる
                    </button>

                    {feedback && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-white bg-opacity-70 backdrop-blur-sm">
                            {feedback === 'correct' ? (
                                <div className="animate-bounce">
                                    <div className="w-64 h-64 border-[32px] border-red-500 rounded-full flex items-center justify-center opacity-90 shadow-2xl"></div>
                                </div>
                            ) : (
                                <div className="animate-pulse">
                                    <XIcon size={250} className="text-blue-600 opacity-90 drop-shadow-2xl" strokeWidth={4} />
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // --- アプリのレンダリング ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
